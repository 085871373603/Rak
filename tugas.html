<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Tugas Kebersihan Rak</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding: 15px; }
        .container { background: #fff; max-width: 400px; margin: 0 auto; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background-color: #e51a23; color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 2rem; margin-bottom: 5px; }
        .header p { font-size: 1rem; font-weight: bold; background: rgba(255,255,255,0.2); display: inline-block; padding: 4px 12px; border-radius: 20px; }
        .content { padding: 20px; }
        
        /* Checkbox & Form */
        .check-group { margin-bottom: 15px; background: #fdf6f6; padding: 12px; border-radius: 8px; border-left: 4px solid #e51a23; }
        .check-group label { display: flex; align-items: flex-start; font-size: 0.95rem; line-height: 1.4; font-weight: bold; cursor: pointer; }
        .check-group input[type="checkbox"] { margin-right: 10px; margin-top: 3px; transform: scale(1.3); accent-color: #e51a23; }
        
        .form-group { margin-top: 20px; margin-bottom: 20px; }
        .form-group h3 { font-size: 0.9rem; color: #555; margin-bottom: 10px; text-transform: uppercase; }
        .input-field { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 10px; font-size: 1rem; }
        textarea.input-field { resize: vertical; min-height: 80px; }
        
        .reminder { background: #fff3cd; color: #856404; padding: 12px; border-radius: 6px; font-size: 0.9rem; text-align: center; font-weight: bold; border: 1px solid #ffeeba; margin-bottom: 20px; }
        
        .btn-save { width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-save:active { background-color: #218838; }
        .btn-back { display: block; text-align: center; margin-top: 15px; color: #555; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="kode-rak">--</h1>
        <p>PIC: <span id="nama-pic">Memuat...</span></p>
    </div>
    
    <div class="content">
        <div class="check-group">
            <label><input type="checkbox" id="cek-debu"> Pastikan rak bersih dari debu</label>
        </div>
        <div class="check-group">
            <label><input type="checkbox" id="cek-expired"> Pastikan cek expired date, RH dan barang rusak</label>
        </div>

        <div class="form-group">
            <h3>Jika Ada Temuan (Opsional)</h3>
            <input type="text" id="temuan-item" class="input-field" placeholder="Nama Item (Contoh: Susu Beruang)">
            <textarea id="temuan-deskripsi" class="input-field" placeholder="Deskripsi (Contoh: Kemasan penyok)"></textarea>
        </div>

        <div class="reminder">
            ⚠️ Pastikan mengisi form ceklis kebersihan di map toko!
        </div>

        <button class="btn-save" onclick="simpanTugas()">Simpan & Selesai</button>
        <a href="alokasi.html" class="btn-back">Kembali ke Alokasi</a>
    </div>
</div>

<script>
    // Inisialisasi Database Lokal jika belum ada
    if (!localStorage.getItem('dbRak')) {
        const dataAwal = {
            "GA1": { pic: "INTAN", lokasi: "AREA KASIR", lastCleaned: 0, temuan: "" },
            "GB1": { pic: "INTAN", lokasi: "AREA KASIR", lastCleaned: 0, temuan: "" },
            "GB2": { pic: "INTAN", lokasi: "AREA KASIR", lastCleaned: 0, temuan: "" }
        };
        localStorage.setItem('dbRak', JSON.stringify(dataAwal));
    }

    const dbRak = JSON.parse(localStorage.getItem('dbRak'));
    const urlParams = new URLSearchParams(window.location.search);
    const idRak = urlParams.get('id');

    // Tampilkan data ke layar
    if (idRak && dbRak[idRak]) {
        document.getElementById('kode-rak').innerText = idRak;
        document.getElementById('nama-pic').innerText = dbRak[idRak].pic;
    } else {
        alert("Kode rak tidak ditemukan! Pastikan scan QR dengan benar.");
        window.location.href = "alokasi.html";
    }

    // Fungsi Simpan
    function simpanTugas() {
        const cekDebu = document.getElementById('cek-debu').checked;
        const cekExpired = document.getElementById('cek-expired').checked;

        if (!cekDebu || !cekExpired) {
            alert("Harap centang semua tugas kebersihan terlebih dahulu!");
            return;
        }

        const namaItem = document.getElementById('temuan-item').value;
        const deskripsi = document.getElementById('temuan-deskripsi').value;
        let dataTemuan = "";
        
        if (namaItem || deskripsi) {
            dataTemuan = `${namaItem} - ${deskripsi}`;
        }

        // Simpan waktu saat ini (timestamp dalam milidetik)
        dbRak[idRak].lastCleaned = new Date().getTime();
        dbRak[idRak].temuan = dataTemuan;

        // Update ke LocalStorage
        localStorage.setItem('dbRak', JSON.stringify(dbRak));

        alert(`Data berhasil disimpan! Rak ${idRak} berstatus BERSIH selama 7 hari ke depan.`);
        window.location.href = "alokasi.html"; // Otomatis kembali ke menu alokasi
    }
</script>

</body>
</html>
