<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Tugas Kebersihan Rak</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #E0E0E0; color: #000; padding: 15px; }
        .container { background: #FFF; max-width: 400px; margin: 0 auto; border: 2px solid #000; box-shadow: 4px 4px 0px #888; overflow: hidden; }
        .header { background-color: #000080; color: white; padding: 20px; text-align: center; border-bottom: 4px solid #D32F2F; }
        .header h1 { font-size: 2rem; margin-bottom: 5px; }
        .header p { font-size: 1rem; font-weight: bold; background: rgba(255,255,255,0.2); display: inline-block; padding: 4px 12px; border-radius: 20px; }
        .content { padding: 20px; }
        
        .check-group { margin-bottom: 15px; background: #FFF9C4; padding: 12px; border: 1px solid #000; box-shadow: 2px 2px 0px #000;}
        .check-group label { display: flex; align-items: flex-start; font-size: 0.95rem; line-height: 1.4; font-weight: bold; cursor: pointer; }
        .check-group input[type="checkbox"] { margin-right: 10px; margin-top: 3px; transform: scale(1.3); accent-color: #D32F2F; }
        
        .form-group { margin-top: 20px; margin-bottom: 20px; }
        .form-group h3 { font-size: 0.9rem; color: #D32F2F; margin-bottom: 10px; text-transform: uppercase; font-weight: bold;}
        .input-field { width: 100%; padding: 12px; border: 2px solid #000; margin-bottom: 10px; font-size: 1rem; }
        textarea.input-field { resize: vertical; min-height: 80px; }
        
        .reminder { background: #E0E0E0; color: #D32F2F; padding: 12px; font-size: 0.9rem; text-align: center; font-weight: bold; border: 2px dashed #D32F2F; margin-bottom: 20px; }
        
        .btn-save { width: 100%; padding: 15px; background-color: #2E7D32; color: white; border: 2px solid #000; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; box-shadow: 2px 2px 0px #000;}
        .btn-save:active { transform: translate(2px, 2px); box-shadow: none; }
        .btn-back { display: block; text-align: center; margin-top: 15px; color: #000080; text-decoration: none; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="kode-rak">MEMUAT...</h1>
        <p>PIC: <span id="nama-pic">...</span></p>
    </div>
    
    <div class="content">
        <div class="check-group">
            <label><input type="checkbox" id="cek-debu"> Pastikan rak bersih dari debu</label>
        </div>
        <div class="check-group">
            <label><input type="checkbox" id="cek-expired"> Pastikan cek expired date, RH dan barang rusak</label>
        </div>

        <div class="form-group">
            <h3>Jika Ada Temuan (Opsional)</h3>
            <input type="text" id="temuan-item" class="input-field" placeholder="Nama Item (Contoh: Susu Beruang)">
            <textarea id="temuan-deskripsi" class="input-field" placeholder="Deskripsi (Contoh: Kemasan penyok/Expired)"></textarea>
        </div>

        <div class="reminder">
            ⚠️ Pastikan mengisi form ceklis kebersihan di map toko!
        </div>

        <button class="btn-save" id="btn-submit">Simpan & Selesai</button>
        <a href="alokasi.html" class="btn-back">⬅ Kembali ke Alokasi</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSyA9AU3aQeUHRM4GmCQPuEVu00K-VtnxGZo",
        authDomain: "rak1-eabff.firebaseapp.com",
        databaseURL: "https://rak1-eabff-default-rtdb.firebaseio.com",
        projectId: "rak1-eabff",
        storageBucket: "rak1-eabff.firebasestorage.app",
        messagingSenderId: "422926040763",
        appId: "1:422926040763:web:4ddf6163969a276d62f39e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Ambil Parameter URL dari hasil Scan Barcode
    const urlParams = new URLSearchParams(window.location.search);
    const idRak = urlParams.get('id_rak');
    const idPic = urlParams.get('pic');

    if (!idRak || !idPic) {
        alert("Akses tidak valid. Pastikan scan dari QR Code resmi.");
        window.location.href = "alokasi.html";
    }

    // Tarik data Rak & PIC dari Firebase
    get(ref(db, `rak/${idRak}`)).then((snapshot) => {
        if(snapshot.exists()) {
            document.getElementById('kode-rak').innerText = snapshot.val().kode_rak || idRak;
        } else {
            document.getElementById('kode-rak').innerText = idRak;
        }
    });

    get(ref(db, `pic/${idPic}`)).then((snapshot) => {
        if(snapshot.exists()) {
            document.getElementById('nama-pic').innerText = snapshot.val().nama || idPic;
        } else {
            document.getElementById('nama-pic').innerText = "Tidak Diketahui";
        }
    });

    // Proses Simpan
    document.getElementById('btn-submit').addEventListener('click', async () => {
        const cekDebu = document.getElementById('cek-debu').checked;
        const cekExpired = document.getElementById('cek-expired').checked;

        if (!cekDebu || !cekExpired) {
            alert("Harap centang semua tugas kebersihan terlebih dahulu!");
            return;
        }

        const btn = document.getElementById('btn-submit');
        btn.innerText = "Menyimpan...";
        btn.disabled = true;

        const namaItem = document.getElementById('temuan-item').value.trim();
        const deskripsi = document.getElementById('temuan-deskripsi').value.trim();
        let dataTemuan = "";
        
        if (namaItem || deskripsi) {
            dataTemuan = `${namaItem} - ${deskripsi}`;
        }

        // Simpan Last Cleaned dan Temuan ke node 'rak' di Firebase
        try {
            await update(ref(db, `rak/${idRak}`), {
                lastCleaned: new Date().getTime(),
                temuan: dataTemuan
            });
            alert("Data berhasil disimpan! Rak berstatus BERSIH selama 7 hari.");
            window.location.href = "alokasi.html";
        } catch (error) {
            alert("Gagal menyimpan data: " + error.message);
            btn.innerText = "Simpan & Selesai";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
